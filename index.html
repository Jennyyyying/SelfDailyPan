<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Todo</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- 首页 -->
<div id="home" class="screen active">
    <div class="main-title">Today</div>

    <div class="menu">
        <button class="btn" onclick="show('todo')">CREATE TODAY'S TODO LIST</button>
        <button class="btn" onclick="show('past')">VIEW PAST LIST</button>
        <button class="btn" onclick="show('record')">SELF RECORDING</button>
    </div>
</div>

<!-- TODO -->
<div id="todo" class="screen">
    <button class="btn back" onclick="show('home')">← Back</button>
    <button class="btn sticker-btn" onclick="toggleSticker()">＋</button>

    <div id="todo-area"></div>

    <button class="btn save-btn" onclick="save()">Save</button>

    <div id="sticker-panel" class="hidden"></div>
    <div id="canvas"></div>
</div>

<!-- Past -->
<div id="past" class="screen">
    <button class="btn back" onclick="show('home')">← Back</button>
    <div id="past-content"></div>
</div>

<!-- Record -->
<div id="record" class="screen">
    <button class="btn back" onclick="show('home')">← Back</button>

    <div class="big-rate" id="big-rate">0%</div>
    <div class="small-title">Completion Rate</div>

    <div class="chart-box">
        <canvas id="chart"></canvas>
        <div id="no-data">暂无数据</div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
