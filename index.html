<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TODO Planner</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- 首页 -->
<div id="home" class="page active">
  <div class="main-title">Today</div>

  <div class="menu">
    <button onclick="showPage('todo')">CREATE A NEW TODO LIST</button>
    <button onclick="showPage('history')">VIEW PAST LIST</button>
    <button onclick="showPage('stats')">SELF RECORDING</button>
  </div>
</div>

<!-- 页面1：TODO -->
<div id="todo" class="page">
  <button class="back" onclick="showPage('home')">← Back</button>

  <h2 id="today-date"></h2>

  <div id="todo-list"></div>

  <button onclick="addTodo()">+ Add</button>
  <button onclick="saveToday()">Save</button>
</div>

<!-- 页面2：历史 -->
<div id="history" class="page">
  <button class="back" onclick="showPage('home')">← Back</button>

  <h2>Past List</h2>
  <div id="history-list"></div>
</div>

<!-- 页面3：统计 -->
<div id="stats" class="page">
  <button class="back" onclick="showPage('home')">← Back</button>

  <h2 id="rate-title"></h2>
  <img id="rate-emoji" width="60">

  <div class="chart-container">
    <canvas id="chart"></canvas>
    <div id="no-data">暂无数据</div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
