<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Todo Plan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 主界面 Today -->
        <div id="main-screen" class="screen active">
            <div class="main-header">
                <h1 class="screen-title">Today</h1>
            </div>
            <div class="action-buttons">
                <button class="btn" onclick="showScreen('todo-screen')">CREATE TODAY'S TODO LIST</button>
                <button class="btn" onclick="showScreen('past-screen')">VIEW PAST LIST</button>
                <button class="btn" onclick="showScreen('record-screen')">SELF RECORDING</button>
            </div>
        </div>

        <!-- 界面1：今日待办 -->
        <div id="todo-screen" class="screen">
            <div class="todo-header">
                <button class="back-btn" onclick="showScreen('main-screen')">← Back</button>
                <button class="add-sticker-btn" onclick="openStickerPanel()">+</button>
            </div>
            <div class="todo-container">
                <div id="todo-items" class="todo-items">
                    <!-- 动态生成待办项 -->
                </div>
            </div>
            <div id="sticker-panel" class="sticker-panel hidden">
                <div class="sticker-library" id="sticker-library">
                    <!-- 动态加载公共+个人贴纸 -->
                </div>
                <button class="upload-sticker-btn" onclick="uploadPersonalSticker()">+ 上传我的贴纸</button>
            </div>
            <div id="sticker-canvas" class="sticker-canvas"></div>
        </div>

        <!-- 界面2：历史列表 -->
        <div id="past-screen" class="screen">
            <div class="header">
                <button class="back-btn" onclick="showScreen('main-screen')">← Back</button>
                <h2 class="screen-title">Past Lists</h2>
            </div>
            <div id="past-lists" class="past-lists">
                <!-- 动态加载历史记录 -->
            </div>
        </div>

        <!-- 界面3：自我记录 -->
        <div id="record-screen" class="screen">
            <div class="header">
                <button class="back-btn" onclick="showScreen('main-screen')">← Back</button>
                <h2 class="screen-title" id="completion-title">Completion Rate: 0% <span id="emoji-container"></span></h2>
            </div>
            <div class="chart-container">
                <canvas id="completion-chart"></canvas>
            </div>
            <div class="chart-controls">
                <button class="btn" onclick="toggleChartView('month')">View Month</button>
                <button class="btn" onclick="toggleChartView('all')">View All Time</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
