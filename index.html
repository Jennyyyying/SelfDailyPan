<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TODO Planner</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- 首页 -->
<div id="home" class="page active">
  <h1>DAILY PLANNER</h1>
  <button onclick="showPage('todo')">CREATE TODAY'S TODO LIST</button>
  <button onclick="showPage('history')">VIEW PAST LIST</button>
  <button onclick="showPage('stats')">SELF RECORDING</button>
</div>

<!-- TODO页面 -->
<div id="todo" class="page">
  <div class="top-bar">
    <h2 id="today-title"></h2>
    <button onclick="openStickerPanel()">＋</button>
  </div>

  <div id="todo-list"></div>

  <!-- 贴纸层 -->
  <div id="sticker-layer"></div>

  <!-- 贴纸面板 -->
  <div id="sticker-panel" class="hidden"></div>

  <button onclick="addTodo()">+ Add</button>
  <button onclick="saveToday()">Save</button>
  <button onclick="showPage('home')">Back</button>
</div>

<!-- 历史 -->
<div id="history" class="page">
  <h2>Past Lists</h2>
  <div id="history-list"></div>
  <button onclick="showPage('home')">Back</button>
</div>

<!-- 统计 -->
<div id="stats" class="page">
  <h2 id="rate-title"></h2>
  <img id="rate-emoji" width="50">
  <canvas id="chart"></canvas>
  <button onclick="showPage('home')">Back</button>
</div>

<script src="app.js"></script>
</body>
</html>
